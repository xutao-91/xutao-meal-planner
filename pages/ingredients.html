<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材管理 - 主人的智能菜谱</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-gray-600 hover:text-gray-900 mr-4">← 返回</a>
                    <span class="text-2xl mr-2">🥬</span>
                    <h1 class="text-xl font-bold text-gray-900">食材管理</h1>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 状态概览 -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">🥬 冷藏食材: <span id="fridge-count">0</span> 种</span>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">❄️ 冷冻食材: <span id="frozen-count">0</span> 种</span>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">📦 总计: <span id="total-count">0</span> 种</span>
                </div>
            </div>
        </div>

        <!-- 添加食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">➕ 添加新食材</h2>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="new-ingredient" placeholder="输入食材名称（如：西红柿）"
                           class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="ingredient-type" class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="fridge">🥬 冷藏</option>
                        <option value="frozen">❄️ 冷冻</option>
                    </select>
                    <button onclick="addIngredient()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                        添加
                    </button>
                </div>
                <!-- 快速添加常用食材 -->
                <div class="mt-4">
                    <div class="text-sm font-medium text-gray-700 mb-2">快速添加：</div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="quickAdd('蒜苔', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">蒜苔</button>
                        <button onclick="quickAdd('西红柿', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">西红柿</button>
                        <button onclick="quickAdd('鸡蛋', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">鸡蛋</button>
                        <button onclick="quickAdd('青椒', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">青椒</button>
                        <button onclick="quickAdd('白菜', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">白菜</button>
                        <button onclick="quickAdd('鳕鱼', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">鳕鱼</button>
                        <button onclick="quickAdd('三文鱼', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">三文鱼</button>
                        <button onclick="quickAdd('肥牛卷', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">肥牛卷</button>
                        <button onclick="quickAdd('乌鸡', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">乌鸡</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 冷藏食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">🥬 冷藏食材</h2>
            </div>
            <div class="p-6">
                <div id="fridge-list" class="flex flex-wrap gap-2">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 冷冻食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">❄️ 冷冻食材</h2>
            </div>
            <div class="p-6">
                <div id="frozen-list" class="flex flex-wrap gap-2">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 智能推荐 -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">💡 基于现有食材可做的菜</h2>
            </div>
            <div class="p-6">
                <div id="recommendations" class="space-y-2">
                    <div class="text-gray-500">添加食材后，这里会显示推荐菜品</div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/menu-data.js"></script>
    <script src="../js/smart-generator.js"></script>
    <script>
        // 初始化：加载 SmartMenuGenerator
        smartGenerator.loadInventory();

        // 渲染食材列表
        function renderIngredients() {
            const fridgeList = document.getElementById('fridge-list');
            const frozenList = document.getElementById('frozen-list');
            const fridgeItems = Object.entries(smartGenerator.fridge);
            const frozenItems = Object.entries(smartGenerator.frozen);

            if (fridgeItems.length === 0) {
                fridgeList.innerHTML = '<span class="text-gray-400">暂无冷藏食材</span>';
            } else {
                fridgeList.innerHTML = fridgeItems.map(([name, count]) => `
                    <span class="ingredient-card selected">
                        ${name} x${count}
                        <span class="remove" onclick="removeIngredient('${name.replace(/'/g, "\\'")}', 'fridge')">×</span>
                    </span>
                `).join('');
            }

            if (frozenItems.length === 0) {
                frozenList.innerHTML = '<span class="text-gray-400">暂无冷冻食材</span>';
            } else {
                frozenList.innerHTML = frozenItems.map(([name, count]) => `
                    <span class="ingredient-card selected">
                        ${name} x${count}
                        <span class="remove" onclick="removeIngredient('${name.replace(/'/g, "\\'")}', 'frozen')">×</span>
                    </span>
                `).join('');
            }

            updateStats();
            updateRecommendations();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('fridge-count').textContent = smartGenerator.getFridgeCount();
            document.getElementById('frozen-count').textContent = smartGenerator.getFrozenCount();
            document.getElementById('total-count').textContent = smartGenerator.getFridgeCount() + smartGenerator.getFrozenCount();
        }

        // 更新推荐
        function updateRecommendations() {
            const container = document.getElementById('recommendations');
            if (!container) return;
            if (typeof DISH_DATABASE === 'undefined') return;

            const allNames = smartGenerator.getAllIngredientNames();
            if (allNames.length === 0) {
                container.innerHTML = '<div class="text-gray-500">添加食材后，这里会显示推荐菜品</div>';
                return;
            }

            const allDishes = [...(DISH_DATABASE.meat || []), ...(DISH_DATABASE.veg || [])];
            const recommendations = allDishes.map(dish => {
                const matchCount = dish.ingredients.filter(ing => smartGenerator.hasIngredient(ing)).length;
                return { dish, matchCount, total: dish.ingredients.length };
            }).sort((a, b) => b.matchCount - a.matchCount).slice(0, 8);

            if (recommendations.length === 0) {
                container.innerHTML = '<div class="text-gray-500">暂无匹配菜品</div>';
                return;
            }

            container.innerHTML = recommendations.map(r => {
                const pct = Math.round((r.matchCount / r.total) * 100);
                const missing = r.dish.ingredients.filter(ing => !smartGenerator.hasIngredient(ing));
                return `
                    <div class="flex justify-between items-center p-2 bg-gray-50 rounded">
                        <div>
                            <span class="font-medium">${r.dish.name}</span>
                            <span class="text-xs text-gray-400 ml-2">匹配 ${pct}%</span>
                            ${missing.length > 0 ? `<span class="text-xs text-orange-500 ml-1">缺: ${missing.join(', ')}</span>` : '<span class="text-xs text-green-600 ml-1">✓ 全有</span>'}
                        </div>
                        <span class="text-xs px-2 py-1 rounded ${r.dish.category === 'meat' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}">
                            ${r.dish.category === 'meat' ? '荤' : '素'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        // 添加食材
        function addIngredient() {
            const nameInput = document.getElementById('new-ingredient');
            const typeInput = document.getElementById('ingredient-type');
            const name = nameInput.value.trim();
            const type = typeInput.value;
            if (!name) return;

            smartGenerator.addToInventory(type, name, 1);
            renderIngredients();
            nameInput.value = '';
        }

        // 快速添加
        function quickAdd(name, type) {
            smartGenerator.addToInventory(type, name, 1);
            renderIngredients();
        }

        // 删除食材
        function removeIngredient(name, type) {
            if (type === 'fridge') {
                delete smartGenerator.fridge[name];
            } else {
                delete smartGenerator.frozen[name];
            }
            smartGenerator.saveInventory();
            renderIngredients();
        }

        // 回车添加
        document.addEventListener('DOMContentLoaded', function() {
            renderIngredients();
            const input = document.getElementById('new-ingredient');
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') addIngredient();
                });
            }
        });
    </script>
</body>
</html>
