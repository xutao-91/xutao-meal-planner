<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材管理 - 主人的智能菜谱</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-gray-600 hover:text-gray-900 mr-4">← 返回</a>
                    <span class="text-2xl mr-2">🥬</span>
                    <h1 class="text-xl font-bold text-gray-900">食材管理</h1>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 状态概览 -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">🥬 冷藏食材: <span id="fridge-count">0</span> 种</span>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">❄️ 冷冻食材: <span id="frozen-count">0</span> 种</span>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">📦 总计: <span id="total-count">0</span> 种</span>
                </div>
            </div>
        </div>

        <!-- 添加食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">➕ 添加新食材</h2>
            </div>
            
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="new-ingredient" placeholder="输入食材名称（如：西红柿）" 
                           class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="ingredient-type" class="border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="fridge">🥬 冷藏</option>
                        <option value="frozen">❄️ 冷冻</option>
                    </select>
                    
                    <button onclick="addIngredient()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                        添加
                    </button>
                </div>
                
                <!-- 快速添加常用食材 -->
                <div class="mt-4">
                    <div class="text-sm font-medium text-gray-700 mb-2">快速添加：</div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="quickAdd('蒜苔', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">蒜苔</button>
                        <button onclick="quickAdd('西红柿', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">西红柿</button>
                        <button onclick="quickAdd('鸡蛋', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">鸡蛋</button>
                        <button onclick="quickAdd('青椒', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">青椒</button>
                        <button onclick="quickAdd('白菜', 'fridge')" class="px-3 py-1 bg-green-100 rounded-full text-sm hover:bg-green-200">白菜</button>
                        <button onclick="quickAdd('鳕鱼', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">鳕鱼</button>
                        <button onclick="quickAdd('三文鱼', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">三文鱼</button>
                        <button onclick="quickAdd('肥牛卷', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">肥牛卷</button>
                        <button onclick="quickAdd('乌鸡', 'frozen')" class="px-3 py-1 bg-blue-100 rounded-full text-sm hover:bg-blue-200">乌鸡</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 冷藏食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">🥬 冷藏食材</h2>
            </div>
            
            <div class="p-6">
                <div id="fridge-list" class="flex flex-wrap gap-2">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 冷冻食材 -->
        <div class="bg-white rounded-lg shadow mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">❄️ 冷冻食材</h2>
            </div>
            
            <div class="p-6">
                <div id="frozen-list" class="flex flex-wrap gap-2">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 智能推荐 -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">💡 基于现有食材可做的菜</h2>
            </div>
            
            <div class="p-6">
                <div id="recommendations" class="space-y-2">
                    <div class="text-gray-500">添加食材后，这里会显示推荐菜品</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let ingredients = {
            fridge: [],
            frozen: []
        };

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('xutao_meal_planner_ingredients');
            if (saved) {
                const data = JSON.parse(saved);
                ingredients.fridge = data.fridge || [];
                ingredients.frozen = data.frozen || [];
            }
            renderIngredients();
            updateStats();
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('xutao_meal_planner_ingredients', JSON.stringify(ingredients));
        }

        // 添加食材
        function addIngredient() {
            const nameInput = document.getElementById('new-ingredient');
            const typeInput = document.getElementById('ingredient-type');
            
            const name = nameInput.value.trim();
            const type = typeInput.value;
            
            if (!name) return;
            
            if (!ingredients[type].includes(name)) {
                ingredients[type].push(name);
                saveData();
                renderIngredients();
                updateStats();
                nameInput.value = '';
            }
        }

        // 快速添加
        function quickAdd(name, type) {
            if (!ingredients[type].includes(name)) {
                ingredients[type].push(name);
                saveData();
                renderIngredients();
                updateStats();
            }
        }

        // 删除食材
        function removeIngredient(name, type) {
            ingredients[type] = ingredients[type].filter(i => i !== name);
            saveData();
            renderIngredients();
            updateStats();
        }

        // 渲染食材列表
        function renderIngredients() {
            const fridgeList = document.getElementById('fridge-list');
            const frozenList = document.getElementById('frozen-list');
            
            if (ingredients.fridge.length === 0) {
                fridgeList.innerHTML = '<span class="text-gray-400">暂无冷藏食材</span>';
            } else {
                fridgeList.innerHTML = ingredients.fridge.map(name => `
                    <span class="ingredient-card selected">
                        ${name}
                        <span class="remove" onclick="removeIngredient('${name}', 'fridge')">×</span>
                    </span>
                `).join('');
            }
            
            if (ingredients.frozen.length === 0) {
                frozenList.innerHTML = '<span class="text-gray-400">暂无冷冻食材</span>';
            } else {
                frozenList.innerHTML = ingredients.frozen.map(name => `
                    <span class="ingredient-card selected">
                        ${name}
                        <span class="remove" onclick="removeIngredient('${name}', 'frozen')">×</span>
                    </span>
                `).join('');
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('fridge-count').textContent = ingredients.fridge.length;
            document.getElementById('frozen-count').textContent = ingredients.frozen.length;
            document.getElementById('total-count').textContent = ingredients.fridge.length + ingredients.frozen.length;
        }

        // 回车添加
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            
            const input = document.getElementById('new-ingredient');
            if (input) {
                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        addIngredient();
                    }
                });
            }
        });
    </script>
</body>
</html>
