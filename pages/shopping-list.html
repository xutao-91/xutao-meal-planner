<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物清单 - 主人的智能菜谱</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="../index.html" class="text-gray-600 hover:text-gray-900 mr-4">← 返回</a>
                    <span class="text-2xl mr-2">🛒</span>
                    <h1 class="text-xl font-bold text-gray-900">购物清单</h1>
                </div>
                <div class="flex items-center">
                    <button onclick="recalculateShoppingList()" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition text-sm mr-2">
                        🔄 重新计算
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 说明 -->
        <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="h-5 w-5 text-blue-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm text-blue-700">
                        根据本周菜单和冰箱库存自动生成购物清单。库存充足的食材不会列出。
                    </p>
                </div>
            </div>
        </div>

        <!-- 清单统计 -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">📦 需购买: <span id="need-buy-count">0</span> 种</span>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">✅ 已有: <span id="have-count">0</span> 种</span>
                </div>
                <div class="flex space-x-2">
                    <button onclick="copyList()" class="text-sm text-blue-600 hover:text-blue-800">📋 复制清单</button>
                    <button onclick="printList()" class="text-sm text-green-600 hover:text-green-800">🖨️ 打印</button>
                </div>
            </div>
        </div>

        <!-- 购物清单 -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-900">📝 本周采购清单</h2>
            </div>
            
            <div id="shopping-list" class="divide-y divide-gray-200">
                <!-- 动态生成 -->
                <div class="p-6 text-gray-500 text-center">
                    正在生成购物清单...
                </div>
            </div>
        </div>

        <!-- 已有食材 -->
        <div class="bg-white rounded-lg shadow mt-6">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                <h2 class="text-lg font-semibold text-gray-700">✅ 已有食材（无需购买）</h2>
            </div>
            
            <div id="have-list" class="p-6">
                <div class="text-gray-500">加载中...</div>
            </div>
        </div>
    </main>

    <script src="../js/menu-data.js"></script>
    <script src="../js/smart-generator.js"></script>
    <script>
        // 加载购物清单
        function loadData() {
            if (typeof smartGenerator === 'undefined') {
                document.getElementById('shopping-list').innerHTML = '<div class="p-6 text-center text-gray-500">加载中...</div>';
                setTimeout(loadData, 500);
                return;
            }
            
            smartGenerator.loadInventory();
            renderShoppingList();
        }

        // 渲染购物清单
        function renderShoppingList() {
            const listContainer = document.getElementById('shopping-list');
            const haveContainer = document.getElementById('have-list');
            
            // 获取分类后的购物清单
            const categorized = smartGenerator.getCategorizedShoppingList();
            
            // 统计总数
            let totalItems = 0;
            for (const items of Object.values(categorized)) {
                totalItems += items.length;
            }
            
            document.getElementById('need-buy-count').textContent = totalItems;
            document.getElementById('have-count').textContent = 
                Object.keys(smartGenerator.fridge).length + Object.keys(smartGenerator.frozen).length;
            
            // 渲染购物清单（按类别）
            if (totalItems === 0) {
                listContainer.innerHTML = `
                    <div class="p-6 text-center">
                        <div class="text-green-600 text-lg mb-2">🎉 恭喜！</div>
                        <div class="text-gray-600">所有食材都已备齐，无需采购</div>
                    </div>
                `;
            } else {
                let html = '';
                const categoryEmojis = {
                    '肉类': '🥩',
                    '海鲜': '🐟',
                    '蔬菜': '🥬',
                    '豆制品': '🧈',
                    '其他': '📦'
                };
                
                let itemIndex = 0;
                for (const [category, items] of Object.entries(categorized)) {
                    if (items.length === 0) continue;
                    
                    html += `
                        <div class="mb-4">
                            <h4 class="font-semibold text-gray-700 mb-2 px-4 py-2 bg-gray-50">${categoryEmojis[category]} ${category}</h4>
                            ${items.map(item => {
                                const id = `item-${itemIndex++}`;
                                const dishesText = item.dishes && item.dishes.length > 0 
                                    ? `<span class="text-xs text-gray-400 ml-2">(${item.dishes.join('、')})</span>` 
                                    : '';
                                return `
                                    <div class="p-3 flex items-center hover:bg-gray-50 border-b border-gray-100">
                                        <input type="checkbox" id="${id}" class="h-5 w-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                                        <label for="${id}" class="ml-3 flex-1">
                                            <span class="text-gray-900">${item.ingredient}</span>
                                            <span class="text-gray-500 text-sm ml-2">x${item.count}</span>
                                            ${dishesText}
                                        </label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                }
                
                listContainer.innerHTML = html;
            }
            
            // 已有食材
            const allIngredients = [
                ...Object.keys(smartGenerator.fridge).map(k => ({name: k, type: 'fridge'})),
                ...Object.keys(smartGenerator.frozen).map(k => ({name: k, type: 'frozen'}))
            ];
            
            if (allIngredients.length === 0) {
                haveContainer.innerHTML = '<div class="text-gray-500">暂无记录的食材</div>';
            } else {
                haveContainer.innerHTML = `
                    <div class="flex flex-wrap gap-2">
                        ${allIngredients.map(item => `
                            <span class="px-3 py-1 ${item.type === 'fridge' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'} rounded-full text-sm">
                                ${item.name} ${item.type === 'fridge' ? '🥬' : '❄️'}
                            </span>
                        `).join('')}
                    </div>
                `;
            }
        }

        // 重新计算购物清单
        function recalculateShoppingList() {
            if (confirm('是否根据当前菜单和库存重新计算购物清单？')) {
                smartGenerator.recalculateShoppingList();
                renderShoppingList();
                
                const count = Object.keys(smartGenerator.shoppingList).length;
                if (count > 0) {
                    alert(`✅ 购物清单已更新！需要采购 ${count} 种食材。`);
                } else {
                    alert('✅ 购物清单已更新！所有食材库存充足。');
                }
            }
        }

        // 复制清单
        function copyList() {
            const categorized = smartGenerator.getCategorizedShoppingList();
            let text = '🛒 本周购物清单\n' + '='.repeat(30) + '\n\n';
            
            for (const [category, items] of Object.entries(categorized)) {
                if (items.length === 0) continue;
                text += `【${category}】\n`;
                items.forEach(item => {
                    const dishesText = item.dishes && item.dishes.length > 0 
                        ? ` (${item.dishes.join('、')})` 
                        : '';
                    text += `□ ${item.ingredient} x${item.count}${dishesText}\n`;
                });
                text += '\n';
            }
            
            text += '='.repeat(30) + '\n生成时间：' + new Date().toLocaleString();
            
            navigator.clipboard.writeText(text).then(() => {
                alert('清单已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }

        // 打印清单
        function printList() {
            window.print();
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
